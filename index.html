<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaFX – Sign In</title>
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-wrapper">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="brand">
        <img src="assets/logo.svg" alt="MetaFX" class="logo" />
        <span class="brand-name">Meta<span class="brand-fx">FX</span></span>
      </div>

      <div class="left-content">
        <h2>Building solutions,<br/>delivering excellence.</h2>
      </div>

      <div class="wave-bg"></div>
      <p class="copyright">© 2024 MetaFX. All rights reserved.</p>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="form-card">
        <div class="form-brand">
          <img src="assets/logo.svg" alt="MetaFX" class="form-logo" />
          <span class="form-brand-name">Meta<span>FX</span></span>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to access your workspace</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="field-group">
            <label>Email address</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M2.5 5.833A1.667 1.667 0 014.167 4.167h11.666A1.667 1.667 0 0117.5 5.833v8.334a1.667 1.667 0 01-1.667 1.666H4.167A1.667 1.667 0 012.5 14.167V5.833z" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 5.833L10 10.833l7.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="email" id="email" placeholder="Enter your email" required autocomplete="email" />
            </div>
          </div>

          <div class="field-group">
            <label>Password</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="3.333" y="9.167" width="13.334" height="9.166" rx="1.667" stroke="currentColor" stroke-width="1.5"/><path d="M6.667 9.167V6.667a3.333 3.333 0 116.666 0v2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="toggle-pw" onclick="togglePassword()">
                <svg id="eyeIcon" viewBox="0 0 20 20" fill="none"><path d="M1.667 10S4.167 4.167 10 4.167 18.333 10 18.333 10 15.833 15.833 10 15.833 1.667 10 1.667 10z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>

          <div class="form-extras">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" />
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-signin">Sign in</button>
        </form>

        <div class="divider"><span>or continue with</span></div>

        <button class="btn-google" onclick="handleGoogle()">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>

        <p class="contact-text">Don't have an account? <a href="#">Contact your admin</a></p>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-signin');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    }
    function handleGoogle() {
      window.location.href = 'dashboard.html';
    }
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
